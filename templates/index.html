<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songket Motif AI Classifier</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load an elegant traditional font (Playfair Display) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Custom Tailwind Config for our specific Gold colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            light: '#FDE047',
                            DEFAULT: '#D4AF37', /* Classic Metallic Gold */
                            dark: '#A16207',
                        }
                    },
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen relative overflow-hidden font-sans">
    
    <!-- Subtle Gold Glowing Background Effects -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-gold rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-gold rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>

    <!-- Main Application Card -->
    <div class="bg-gray-900 border border-gold/30 p-8 rounded-xl shadow-[0_0_40px_rgba(212,175,55,0.15)] max-w-lg w-full text-center relative z-10">
        
        <!-- Traditional Header -->
        <h1 class="text-4xl font-bold text-gold font-playfair mb-2 tracking-wide">Songket Motifs Classification</h1>
        
        <!-- Elegant Divider -->
        <div class="flex items-center justify-center space-x-3 mb-6">
            <div class="h-[1px] w-16 bg-gold/40"></div>
            <span class="text-gold/80 text-lg">✧</span>
            <div class="h-[1px] w-16 bg-gold/40"></div>
        </div>

        <p class="text-gray-400 mb-8 font-light text-sm">Upload a woven motif image for deep learning classification.</p>

        <!-- The Upload Form -->
        <form id="uploadForm" enctype="multipart/form-data" class="space-y-6">
            <!-- Dark Upload Box with Gold Dashed Border -->
            <div class="border-2 border-dashed border-gold/40 p-6 rounded-lg bg-gray-950/50 hover:border-gold transition duration-300 group">
                <input type="file" id="imageInput" name="file" accept="image/*" class="w-full text-gray-400 
                    file:mr-4 file:py-2 file:px-4 
                    file:rounded-md file:border-0 
                    file:text-sm file:font-semibold 
                    file:bg-gold/10 file:text-gold 
                    hover:file:bg-gold/20 cursor-pointer" required>
            </div>
            
            <!-- Gold Gradient Button -->
            <button type="submit" class="w-full bg-gradient-to-r from-gold-dark via-gold to-gold-light text-gray-950 font-extrabold py-3 rounded-lg hover:brightness-110 transition duration-300 shadow-[0_0_15px_rgba(212,175,55,0.4)] tracking-wider">
                ANALYZE MOTIF
            </button>
        </form>

        <!-- Loading Text -->
        <p id="loadingText" class="text-gold-light font-playfair italic mt-6 hidden animate-pulse">Running MobileNetV2 Inference...</p>

        <!-- The Results Box (Hidden until AI finishes) -->
        <div id="resultBox" class="mt-8 hidden border-t border-gold/20 pt-6">
            <h2 class="text-sm tracking-widest uppercase text-gray-500 mb-4 font-bold">Classification Result</h2>
            
            <!-- Image with Gold Frame -->
            <div class="inline-block p-1 bg-gradient-to-br from-gold-dark to-gold-light rounded-lg shadow-lg mb-4">
                <img id="uploadedImage" src="" alt="Uploaded Motif" class="w-48 h-48 object-cover rounded shadow-md border-2 border-gray-900">
            </div>
            
            <p class="text-sm text-gray-400 font-light mt-2">Predicted Motif:</p>
            <p id="motifName" class="text-3xl font-extrabold text-gold font-playfair mb-2 tracking-wide drop-shadow-md"></p>
            
            <p class="text-xs text-gray-500 uppercase tracking-widest mt-4">Confidence Score</p>
            <p id="confidenceScore" class="text-xl font-bold text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.4)]"></p>
        </div>
    </div>

    <!-- JavaScript (Unchanged) -->
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const fileInput = document.getElementById('imageInput');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('loadingText').classList.remove('hidden');

            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();

                if(data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('motifName').textContent = data.motif;
                    document.getElementById('confidenceScore').textContent = data.confidence;
                    document.getElementById('uploadedImage').src = '/' + data.image_path;
                    
                    document.getElementById('resultBox').classList.remove('hidden');
                }
            } catch (error) {
                alert('Error connecting to the AI server.');
            } finally {
                document.getElementById('loadingText').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
